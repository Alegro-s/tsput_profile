name: tsput_profile
description: "ТГПУ профиль — мобильное приложение для студентов"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: 6.1.5
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_localization: ^0.3.3
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  http: ^1.0.0
  open_file: ^3.5.11
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/app_icon.png
  web:
    generate: true
    image_path: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
