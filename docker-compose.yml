# Запуск: docker compose up -d --build
# С фронтом (Flutter Web для MAX): см. deploy/README.md — профиль web
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tsput
      POSTGRES_PASSWORD: tsput
      POSTGRES_DB: tsput_profile
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsput -d tsput_profile"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: prod
      MOCK_MODE: "true"
      DATABASE_URL: postgresql://tsput:tsput@db:5432/tsput_profile
      API_DEMO_LOGIN: student@university.ru
      API_DEMO_PASSWORD: password123
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    profiles: ["web"]
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./build/web:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  pgdata:
